<div class="site-footer__actions">
  <div class="site-footer__control">
    <label for="footer-language" class="site-footer__label">Language</label>
    <div class="site-footer__select-shell">
      <select id="footer-language" class="lang-select">
        <option value="ja">日本語</option>
        <option value="en">English</option>
      </select>
      <span class="site-footer__icon">▾</span>
    </div>
  </div>
  <div class="site-footer__control">
    <label for="footer-theme" class="site-footer__label theme-indicator" data-i18n="themeLabel">テーマ</label>
    <div class="site-footer__select-shell">
      <select id="footer-theme" class="theme-select">
        <option value="system" data-i18n="themeSystem">システム</option>
        <option value="light" data-i18n="themeLight">ライト</option>
        <option value="dark" data-i18n="themeDark">ダーク</option>
      </select>
      <span class="site-footer__icon theme-select-icon">▾</span>
    </div>
  </div>
</div>
