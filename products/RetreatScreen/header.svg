<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#13294b" />
      <stop offset="100%" stop-color="#38f9d7" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#a3ffe6" stop-opacity="0.05" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="2" fill="#7fffe3" opacity="0.12" />
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="50" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#hero)" />
  <rect x="100" y="80" width="500" height="500" rx="140" fill="#0b1224" opacity="0.65" filter="url(#glow)" />
  <rect x="1160" y="520" width="240" height="240" rx="70" fill="#a5ffe7" opacity="0.14" />
  <rect x="90" y="160" width="1420" height="620" rx="60" fill="#0c1425" opacity="0.75" stroke="#7fffe3" stroke-opacity="0.22" />
  <rect x="140" y="210" width="1320" height="520" rx="48" fill="url(#glass)" stroke="#c8fff5" stroke-opacity="0.12" />
  <rect x="140" y="210" width="1320" height="520" rx="48" fill="url(#dots)" opacity="0.4" />

  <g transform="translate(220,260)">
    <rect x="0" y="0" width="460" height="380" rx="48" fill="#0b1224" stroke="#c8fff5" stroke-opacity="0.25" />
    <text x="40" y="86" fill="#e8fbff" font-family="'SF Pro Display', 'Inter', sans-serif" font-size="56" font-weight="700">RetreatScreen</text>
    <text x="40" y="150" fill="#c8d5ff" font-family="'SF Mono','Menlo',monospace" font-size="24" opacity="0.9">⌘⇧Space で一瞬にして</text>
    <text x="40" y="190" fill="#c8d5ff" font-family="'SF Mono','Menlo',monospace" font-size="24" opacity="0.9">iOS 風ランチャーを展開</text>
    <text x="40" y="240" fill="#bff7ee" font-family="'Inter', sans-serif" font-size="20" opacity="0.9">・フルスクリーンのブラーオーバーレイ</text>
    <text x="40" y="278" fill="#bff7ee" font-family="'Inter', sans-serif" font-size="20" opacity="0.9">・編集モードでドラッグ＆ドロップ整列</text>
    <text x="40" y="316" fill="#bff7ee" font-family="'Inter', sans-serif" font-size="20" opacity="0.9">・ショートカットは自動保存</text>
  </g>

  <g transform="translate(730,250)" filter="url(#glow)">
    <rect x="0" y="0" width="650" height="420" rx="38" fill="#0d1a31" stroke="#7fffe3" stroke-opacity="0.26" />
    <rect x="36" y="40" width="578" height="340" rx="28" fill="#101d35" stroke="#7fffe3" stroke-opacity="0.16" />
    <rect x="70" y="70" width="110" height="110" rx="26" fill="#7fffe3" opacity="0.75" />
    <rect x="210" y="70" width="110" height="110" rx="26" fill="#7fffe3" opacity="0.3" />
    <rect x="350" y="70" width="110" height="110" rx="26" fill="#7fffe3" opacity="0.5" />
    <rect x="490" y="70" width="110" height="110" rx="26" fill="#7fffe3" opacity="0.25" />
    <rect x="70" y="210" width="110" height="110" rx="26" fill="#38f9d7" opacity="0.85" />
    <rect x="210" y="210" width="110" height="110" rx="26" fill="#38f9d7" opacity="0.4" />
    <rect x="350" y="210" width="110" height="110" rx="26" fill="#38f9d7" opacity="0.6" />
    <rect x="490" y="210" width="110" height="110" rx="26" fill="#38f9d7" opacity="0.32" />
  </g>
</svg>
